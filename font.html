<a href="./index.html">⬅ Kembali ke Home</a>

<script>
function copy(text){
  navigator.clipboard.writeText(text).then(()=>{
    alert("✔ Copied!");
  }).catch(()=>{
    let temp=document.createElement("textarea");
    temp.value=text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    document.body.removeChild(temp);
    alert("✔ Copied!");
  });
}
