<!DOCTYPE html>
<html>
<head>
  <title>Font FF 100+</title>
  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #f5f5f5;
    }

    h2 { text-align: center; }

    .box {
      background: white;
      border: 1px solid #ddd;
      padding: 10px;
      margin: 6px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 5px 12px;
      border: none;
      background: #222;
      color: white;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h2>🔥 Font FF Keren 100+</h2>

<p style="text-align:center;">Klik copy untuk ambil font 👇</p>

<!-- FONT LIST -->
<div class="box"><span>𝔽𝕠𝕟𝕥 𝔽𝔽 𝕂𝕖𝕣𝕖𝕟</span><button onclick="copy('𝔽𝕠𝕟𝕥 𝔽𝔽 𝕂𝕖𝕣𝕖𝕟')">Copy</button></div>
<div class="box"><span>𝓕𝓸𝓷𝓽 𝓕𝓕 𝓢𝓽𝔂𝓵𝓮</span><button onclick="copy('𝓕𝓸𝓷𝓽 𝓕𝓕 𝓢𝓽𝔂𝓵𝓮')">Copy</button></div>
<div class="box"><span>𝙵𝙵 𝙲𝚘𝚘𝚕</span><button onclick="copy('𝙵𝙵 𝙲𝚘𝚘𝚕')">Copy</button></div>
<div class="box"><span>ＦＦ ＫＥＲＥＮ</span><button onclick="copy('ＦＦ ＫＥＲＥＮ')">Copy</button></div>
<div class="box"><span>Ｆｒｅｅ Ｆｉｒｅ</span><button onclick="copy('Ｆｒｅｅ Ｆｉｒｅ')">Copy</button></div>

<div class="box"><span>𝑭𝒐𝒏𝒕 𝑭𝑭</span><button onclick="copy('𝑭𝒐𝒏𝒕 𝑭𝑭')">Copy</button></div>
<div class="box"><span>𝘍𝘍 𝘚𝘵𝘺𝘭𝘦</span><button onclick="copy('𝘍𝘍 𝘚𝘵𝘺𝘭𝘦')">Copy</button></div>
<div class="box"><span>𝖥𝖥 𝖢𝗈𝗈𝗅</span><button onclick="copy('𝖥𝖥 𝖢𝗈𝗈𝗅')">Copy</button></div>
<div class="box"><span>𝔽𝔽 𝕊𝕥𝕪𝕝𝕖</span><button onclick="copy('𝔽𝔽 𝕊𝕥𝕪𝕝𝕖')">Copy</button></div>
<div class="box"><span>𝒻𝒻 𝒻𝑜𝓃𝓉</span><button onclick="copy('𝒻𝒻 𝒻𝑜𝓃𝓉')">Copy</button></div>

<!-- tambahan variasi -->
<div class="box"><span>Ｆ𝙵 Sᴛʏʟᴇ</span><button onclick="copy('Ｆ𝙵 Sᴛʏʟᴇ')">Copy</button></div>
<div class="box"><span>𝐅𝐅 𝐊𝐞𝐫𝐞𝐧</span><button onclick="copy('𝐅𝐅 𝐊𝐞𝐫𝐞𝐧')">Copy</button></div>
<div class="box"><span>𝗙𝗙 𝗦𝘁𝘆𝗹𝗲</span><button onclick="copy('𝗙𝗙 𝗦𝘁𝘆𝗹𝗲')">Copy</button></div>
<div class="box"><span>𝘧𝘧 𝘤𝘰𝘰𝘭</span><button onclick="copy('𝘧𝘧 𝘤𝘰𝘰𝘭')">Copy</button></div>
<div class="box"><span>𝕱𝕱 𝕊𝕥𝕪𝕝𝕖</span><button onclick="copy('𝕱𝕱 𝕊𝕥𝕪𝕝𝕖')">Copy</button></div>

<!-- JS -->
<script>
function copy(text) {
  navigator.clipboard.writeText(text);
  alert("✔ Copied: " + text);
}
</script>

<br><br>

<a href="./index.html">⬅ Kembali ke Home</a>

</body>
</html>
