<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Font FF 50+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  margin:0;
  background:#0b1220;
  color:#fff;
  padding:15px;
}

.header{
  text-align:center;
  padding:15px;
  font-weight:bold;
}

.box{
  background:#111a2e;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#00ffcc;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

a.home{
  display:block;
  text-align:center;
  margin-top:20px;
  color:#00ffcc;
  font-weight:bold;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">🔥 FONT FF 50+</div>

<!-- FONT LIST -->
<div class="box"><span>𝔽𝕠𝕟𝕥 𝕂𝕖𝕣𝕖𝕟</span><button onclick="copy('𝔽𝕠𝕟𝕥 𝕂𝕖𝕣𝕖𝕟')">COPY</button></div>
<div class="box"><span>𝐅𝐅 𝐊𝐞𝐫𝐞𝐧</span><button onclick="copy('𝐅𝐅 𝐊𝐞𝐫𝐞𝐧')">COPY</button></div>
<div class="box"><span>𝗙𝗙 𝗦𝘁𝘆𝗹𝗲</span><button onclick="copy('𝗙𝗙 𝗦𝘁𝘆𝗹𝗲')">COPY</button></div>
<div class="box"><span>𝙵𝙵 𝙲𝚘𝚘𝚕</span><button onclick="copy('𝙵𝙵 𝙲𝚘𝚘𝚕')">COPY</button></div>
<div class="box"><span>𝘍𝘍 𝘚𝘵𝘺𝘭𝘦</span><button onclick="copy('𝘍𝘍 𝘚𝘵𝘺𝘭𝘦')">COPY</button></div>

<div class="box"><span>𝕱𝕱 𝕂𝕖𝕣𝕖𝕟</span><button onclick="copy('𝕱𝕱 𝕂𝕖𝕣𝕖𝕟')">COPY</button></div>
<div class="box"><span>𝑭𝑭 𝑺𝒕𝒚𝒍𝒆</span><button onclick="copy('𝑭𝑭 𝑺𝒕𝒚𝒍𝒆')">COPY</button></div>
<div class="box"><span>𝒻𝒻 𝒻𝑜𝓃𝓉</span><button onclick="copy('𝒻𝒻 𝒻𝑜𝓃𝓉')">COPY</button></div>
<div class="box"><span>ＦＦ ＫＥＲＥＮ</span><button onclick="copy('ＦＦ ＫＥＲＥＮ')">COPY</button></div>
<div class="box"><span>Ｆｒｅｅ Ｆｉｒｅ</span><button onclick="copy('Ｆｒｅｅ Ｆｉｒｅ')">COPY</button></div>

<div class="box"><span>𝖥𝖥 𝖢𝗈𝗈𝗅</span><button onclick="copy('𝖥𝖥 𝖢𝗈𝗈𝗅')">COPY</button></div>
<div class="box"><span>𝓕𝓕 𝓢𝓽𝔂𝓵𝓮</span><button onclick="copy('𝓕𝓕 𝓢𝓽𝔂𝓵𝓮')">COPY</button></div>
<div class="box"><span>𝔣𝔣 𝔰𝔱𝔶𝔩𝔢</span><button onclick="copy('𝔣𝔣 𝔰𝔱𝔶𝔩𝔢')">COPY</button></div>
<div class="box"><span>𝙛𝙛 𝙨𝙩𝙮𝙡𝙚</span><button onclick="copy('𝙛𝙛 𝙨𝙩𝙮𝙡𝙚')">COPY</button></div>

<!-- HOME -->
<a class="home" href="index.html">⬅ Kembali ke Home</a>

<script>
function copy(text){
  navigator.clipboard.writeText(text);
  alert("✔ Copied: " + text);
}
</script>

</body>
</html>
