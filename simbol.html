<!DOCTYPE html>
<html>
<head>
  <title>Simbol FF Keren</title>
  <style>
    body { font-family: Arial; padding: 15px; background:#f5f5f5; }
    .box {
      background:white;
      margin:6px 0;
      padding:10px;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border:1px solid #ddd;
    }
    button {
      background:#222;
      color:white;
      border:none;
      padding:6px 10px;
      border-radius:6px;
    }
  </style>
</head>
<body>

<h2>🔥 Simbol FF Keren</h2>

<div class="box"><span>✦ Bintang</span><button onclick="copy('✦')">Copy</button></div>
<div class="box"><span>★ Bintang</span><button onclick="copy('★')">Copy</button></div>
<div class="box"><span>☆ Kosong</span><button onclick="copy('☆')">Copy</button></div>
<div class="box"><span>✧ Percikan</span><button onclick="copy('✧')">Copy</button></div>
<div class="box"><span>⚡ Petir</span><button onclick="copy('⚡')">Copy</button></div>
<div class="box"><span>☠ Tengkorak</span><button onclick="copy('☠')">Copy</button></div>
<div class="box"><span>👑 Mahkota</span><button onclick="copy('👑')">Copy</button></div>
<div class="box"><span>🔥 Api</span><button onclick="copy('🔥')">Copy</button></div>
<div class="box"><span>💎 Diamond</span><button onclick="copy('💎')">Copy</button></div>
<div class="box"><span>⚔ Pedang</span><button onclick="copy('⚔')">Copy</button></div>

<br>

<a href="./index.html">⬅ Home</a>

<script>
function copy(text){
  navigator.clipboard.writeText(text);
  alert("✔ Copied: " + text);
}
</script>

</body>
</html>
