
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FF Bio Generator – Keren & Viral</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background:linear-gradient(180deg,#020617,#020617);
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
  text-align:center;
  padding:40px 15px;
}
h1{color:#ff9800}
select,button{
  padding:10px 15px;
  margin:8px;
  border:none;
  border-radius:8px;
  font-size:16px;
}
button{
  background:#ff9800;
  color:#000;
  font-weight:bold;
}
#bio{
  margin-top:20px;
  padding:15px;
  border:2px dashed #ff9800;
  border-radius:10px;
  min-height:60px;
  font-size:18px;
  color:#00e5ff;
}
</style>
</head>

<body>

<h1>🔥 FF BIO GENERATOR 🔥</h1>

<select id="kategori">
  <option value="pro">🔥 Pro</option>
  <option value="toxic">☠️ Toxic</option>
  <option value="santai">😎 Santai</option>
</select>

<br>
<button onclick="generate()">🎯 GENERATE BIO</button>
<button onclick="copyBio()">📋 COPY</button>

<div id="bio">Klik tombol generate</div>

<script>
const data={

"🔥 PRO PLAYER 🔥","⚡ HEADSHOT ONLY ⚡","🎯 AIM NO MISS",
"FF PRO MODE","NO MERCY","BOOYAH IS HABIT",
"KILL > TALK","FAST HAND FAST BOOYAH",
"SQUAD FEAR ME","RUSH BOSS","CLUTCH KING",
"ONE TAP ONE DEAD","FF LEGEND","PRO NO DEBAT",
"SKILL > SKIN","TRY HARD MODE","SERIOUS PLAYER",
"WIN OR LEARN","ZONE MASTER","PRO FF LIFE",
"HEADSHOT MACHINE","ELITE MODE","PRO MINDSET",
"NO CAMP NO FEAR","FULL RUSH","PRO PLAYER ID",
"FF ESPORT SOUL","REAL PRO","AIM GOD",
"RANK PUSHER","MASTER FF","PRO EVERY MATCH"
],

"☠️ BOT JANGAN NANGIS","NO TALK JUST BOOYAH",
"BOT ALERT","KNOCK DULU BARU BACOT",
"SKILL ISSUE?","MENDING AFK",
"BOT KETEMU PRO","KOK MATI?",
"BOT KOK SAKIT HATI","NANGIS DI LOBBY",
"EZ GAME","BOT MODE ON",
"FREE KILL","NGAPAIN HIDUP?",
"BOT FF","MAIN ATAU PULANG",
"NO SKILL NO TALK","BOT DETECTED",

"BELAJAR DULU","BOT KESEL",

],
santai:[

function generate(){
  const kat=document.getElementById("kategori").value;
  const list=data[kat];
  const i=Math.floor(Math.random()*list.length);
  document.getElementById("bio").innerText=list[i];
}

function copyBio(){
  const t=document.getElementById("bio").innerText;
  navigator.clipboard.writeText(t);
  alert("Bio berhasil dicopy!");
}
</script>

</body>
</html>
