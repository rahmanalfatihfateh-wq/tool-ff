
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FF Bio Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#020617,#020024,#020617);
  color:#fff;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
h1{
  text-align:center;
  margin-bottom:20px;
}
.bio-list{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.bio-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  border-radius:10px;
  background:linear-gradient(90deg,#ff0080,#7928ca,#2afadf);
}
.bio-text{
  font-size:14px;
  font-weight:600;
}
button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
.copy{
  background:#00ff9c;
}
.copy:active{
  transform:scale(0.95);
}
</style>
</head>

<body>
<div class="container">
<h1>🔥 FF BIO KINIAN 🔥</h1>

<div class="bio-list">

  <button class="copy" onclick="copyText(this)">COPY</button>`;

});

function copyText(btn){
  const text = btn.parentElement.querySelector(".bio-text").innerText;
  navigator.clipboard.writeText(text);
