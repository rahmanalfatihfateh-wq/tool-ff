<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FF Bio Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#020617,#020024,#020617);
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.bio-list{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.bio-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  border-radius:10px;
  background:linear-gradient(90deg,#ff0080,#7928ca,#2afadf);
}

.bio-text{
  font-size:14px;
  font-weight:600;
}

button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.copy{
  background:#00ff9c;
}

.copy:active{
  transform:scale(0.95);
}
</style>
</head>

<body>

<div class="container">

<div style="margin-bottom:15px;font-weight:bold;color:#00ff9c;">
  🔢 Total Bio Dicopy: <span id="copyCount">0</span>
</div>

<h1>🔥 FF BIO KINIAN 🔥</h1>

<div class="bio-list" id="bioList"></div>

</div>

<script>
let totalCopy = 0;

const bios = [
"🔥 NO MERCY • FF PLAYER",
"⚡ HEADSHOT OR NOTHING",
"👑 SOLO BUT DEADLY",
"💀 RUSH BUKAN NANYA",
"🔥 BOOYAH IS HABIT",
"⚡ AIM ON • BRAIN OFF",
"👑 LAST MAN STANDING",
"🔥 MAIN SENYAP • MATI CEPAT",
"💀 ONE TAP KING",
"⚔️ FF TANPA AMPUN",
"🎯 HEADSHOT ONLY",
"👁️ NO FEAR NO MERCY",
"💣 RUSH ALL DAY",
"⚡ FAST KILL",
"🔥 FF NIGHTMARE",
"👑 MVP SETIAP MATCH",
"💀 ZONE LAST HERO",
"⚔️ CLUTCH MASTER",
"🎯 AKURASI DEWA",
"🔥 JANGAN KEDEKET",
"⚡ SPEED + AIM",
"👁️ LIHAT • BIDIK • MATI",
"💣 KILL MODE ON",
"🔥 FF IS MY GAME",
"👑 PRO TANPA BACOT",
"⚔️ SKILL BUKAN BACOT",
"💀 SATU PELURU",
"🎯 KEPALA TARGET",
"🔥 AUTO MENANG",
"⚡ GG SETIAP HARI",
"👁️ DILIHAT LANGSUNG TUMBANG",
"💣 RUSH SAMPAI ZONE",
"🔥 MAIN TENANG",
"👑 NO DRAMA",
"⚔️ FF HARD MODE",
"💀 JANGAN SALAH LAWAN",
"🎯 AIM LOCK",
"🔥 MAIN CEPAT",
"⚡ PRO MODE",
"👁️ DEADLY MOVE",
"💣 SERANG DULU",
"🔥 BOOYAH TIME",
"👑 SOLO KING",
"⚔️ FF LEGEND",
"💀 LAST BULLET",
"🎯 SHOT PERFECT",
"🔥 READY WAR",
"⚡ FF VIBES",
"👁️ NO SECOND CHANCE",
"💣 GAS TERUS"
];

const list = document.getElementById("bioList");

bios.forEach(text=>{
  const div = document.createElement("div");
  div.className = "bio-item";
  div.innerHTML = `
    <span class="bio-text">${text}</span>
    <button class="copy" onclick="copyText(this)">COPY</button>
  `;
  list.appendChild(div);
});

function copyText(btn){
  const text = btn.parentElement.querySelector(".bio-text").innerText;

  navigator.clipboard.writeText(text);

  btn.innerText = "COPIED";
  setTimeout(()=>btn.innerText="COPY", 1000);

  totalCopy++;
  document.getElementById("copyCount").innerText = totalCopy;

  const toast = document.createElement("div");
  toast.innerText = "⚡ Bio dicopy!";
  toast.style.cssText = `
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#00ff9c;
    color:black;
    padding:10px 15px;
    border-radius:10px;
    font-weight:bold;
    z-index:9999;
  `;

  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(), 1200);
}

document.addEventListener("copy", function(){
  totalCopy++;
  document.getElementById("copyCount").innerText = totalCopy;
});
</script>

</body>
</html>
