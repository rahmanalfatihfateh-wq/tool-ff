<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool FF Kentang - Pro Player</title>

  <style>
    body {
      background: linear-gradient(180deg,#050b1e,#020617);
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }
    .box {
      max-width: 600px;
      margin: auto;
      background: #0b122f;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }
    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #22c55e;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    #hasil {
      margin-top: 20px;
      text-align: left;
      line-height: 1.6;
    }
    h2, h3 {
      color: #facc15;
    }
  </style>
</head>

<body>

  <h1>Tool FF Kentang</h1>

  <div class="box">
    <select id="ram">
      <option value="">Pilih RAM HP</option>
      <option value="2">2 GB</option>
      <option value="3">3 GB+</option>
    </select>

    <button onclick="cekSetting()">Cek Pengaturan</button>

    <div id="hasil"></div>
  </div>

  <script>
    function cekSetting() {
      var ram = document.getElementById("ram").value;
      var hasil = document.getElementById("hasil");

      if (ram === "3") {
        hasil.innerHTML = `
        <h2>FF Pro Player Setting</h2>
        <p>
        Setting ini digunakan oleh player berpengalaman untuk menjaga FPS tetap stabil
        saat war dan turnamen.
        </p>

        <h3>🎮 Grafik</h3>
        <ul>
          <li>Grafik: Balanced</li>
          <li>Resolusi: High</li>
          <li>Shadow: OFF</li>
          <li>Anti-Aliasing: OFF</li>
          <li>High FPS: ON</li>
        </ul>

        <h3>⚡ FPS & Performa</h3>
        <ul>
          <li>FPS Mode: High</li>
          <li>V-Sync: OFF</li>
          <li>Background App: Tutup semua</li>
        </ul>

        <h3>🎯 Sensitivity Pro Player</h3>
        <ul>
          <li>General: 90 – 95</li>
          <li>Red Dot: 85 – 90</li>
          <li>2x Scope: 75 – 80</li>
          <li>4x Scope: 65 – 70</li>
          <li>AWM Scope: 50 – 55</li>
        </ul>

        <h3>🔥 Tips Tambahan</h3>
        <ul>
          <li>Main di suhu HP dingin</li>
          <li>Gunakan jaringan stabil</li>
          <li>Jangan charge sambil main</li>
        </ul>
        `;
      } else if (ram === "2") {
        hasil.innerHTML = `
        <h2>FF Mode Kentang</h2>
        <p>
        Setting ringan untuk HP RAM 2 GB agar tidak patah-patah.
        </p>

        <ul>
          <li>Grafik: Smooth</li>
          <li>Shadow: OFF</li>
          <li>High FPS: OFF</li>
          <li>Resolution: Low</li>
        </ul>
        `;
      } else {
        hasil.innerHTML = "<p>⚠️ Pilih RAM HP dulu.</p>";
      }
    }
  </script>

</body>
</html>
