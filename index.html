
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FF Bio Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#020617,#020024,#020617);
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:10px;
}

.counter{
  text-align:center;
  margin-bottom:20px;
  font-weight:bold;
  color:#00ff9c;
}

.bio-list{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.bio-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  border-radius:12px;
  background:linear-gradient(90deg,#ff0080,#7928ca,#2afadf);
  transition:transform .2s;
}

.bio-item:hover{
  transform:scale(1.02);
}

.bio-text{
  font-size:14px;
  font-weight:600;
}

.copy-btn{
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  background:#00ff9c;
  color:#000;
}

.copy-btn:active{
  transform:scale(0.9);
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 FF BIO KINIAN 🔥</h1>
<div class="counter">
  🔢 Total Bio Dicopy: <span id="copyCount">0</span>
</div>

<div class="bio-list" id="bioList"></div>

</div>

<script>
let totalCopy = 0;

const bios = [
"🔥 NO MERCY • FF PLAYER",
"⚡ HEADSHOT OR NOTHING",
"👑 SOLO BUT DEADLY",
"💀 RUSH BUKAN NANYA",
"🔥 BOOYAH IS HABIT",
"⚡ AIM ON • BRAIN OFF",
"👑 LAST MAN STANDING",
"💀 ONE TAP KING",
"🎯 HEADSHOT ONLY",
"⚔️ FF TANPA AMPUN",
"🔥 PRO TANPA BACOT",
"💣 RUSH ALL DAY",
"⚡ FAST KILL",
"👁️ NO FEAR NO MERCY",
"🔥 FF IS MY GAME",
"👑 SOLO KING",
"⚔️ CLUTCH MASTER",
"🎯 AIM LOCK",
"💀 JANGAN SALAH LAWAN",
"💣 GAS TERUS"
];

const list = document.getElementById("bioList");

bios.forEach(text=>{
  const div = document.createElement("div");
  div.className = "bio-item";
  div.innerHTML = `
    <span class="bio-text">${text}</span>
    <button class="copy-btn">COPY</button>
  `;
  list.appendChild(div);
});

document.querySelectorAll(".copy-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const text = btn.previousElementSibling.innerText;
    navigator.clipboard.writeText(text);

    totalCopy++;
    document.getElementById("copyCount").innerText = totalCopy;

    btn.innerText = "✔ COPIED";
    btn.style.background = "#22c55e";

    showToast("⚡ Bio dicopy!");

    setTimeout(()=>{
      btn.innerText = "COPY";
      btn.style.background = "#00ff9c";
    },1000);
  });
});

function showToast(msg){
  const toast = document.createElement("div");
  toast.innerText = msg;
  toast.style.cssText = `
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#00ff9c;
    color:black;
    padding:10px 15px;
    border-radius:12px;
    font-weight:bold;
    z-index:9999;
  `;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),1200);
}
</script>

</body>
</html>
