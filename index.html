<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bio FF Keren</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#0b1220;
  color:#fff;
}

.header{
  padding:20px;
  text-align:center;
  background:linear-gradient(90deg,#ff0080,#7928ca,#00ffcc);
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

.search{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin:15px 0;
}

.section-title{
  margin:20px 0 10px;
  color:#00ffcc;
  font-weight:bold;
}

.bio-item{
  background:#111a2e;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.bio-text{
  font-size:14px;
}

button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  background:#00ffcc;
  font-weight:bold;
  cursor:pointer;
}

.counter{
  text-align:center;
  margin:10px 0;
  color:#00ffcc;
}
</style>
</head>

<body>

<div class="header">
  <h2>🔥 BIO FF KEREN 🔥</h2>
  <p>Style ala DuniaGames (versi kamu)</p>
</div>

<div class="container">

<div class="counter">
🔢 Total Bio Dicopy: <span id="count">0</span>
</div>

<input class="search" id="search" placeholder="Cari bio FF...">

<div class="section-title">🔥 Bio FF Keren</div>
<div id="list"></div>

</div>

<script>
let total = 0;

const bios = [
"Skin tidak perlu, skill nomor satu",
"KD boleh kecil, tapi nyali gak mungil",
"HP kentang tapi skill dewa",
"Jago itu diakui bukan mengakui",
"Free Fire = Hidup",
"Solo but deadly",
"Headshot or nothing",
"Booyah is habit",
"No mercy player",
"Clutch master"
];

const list = document.getElementById("list");

function render(data){
  list.innerHTML="";
  data.forEach(b=>{
    list.innerHTML+=`
      <div class="bio-item">
        <span class="bio-text">${b}</span>
        <button onclick="copyBio('${b}',this)">COPY</button>
      </div>`;
  });
}

render(bios);

function copyBio(text,btn){
  navigator.clipboard.writeText(text);
  total++;
  document.getElementById("count").innerText=total;
  btn.innerText="COPIED";
  setTimeout(()=>btn.innerText="COPY",1000);
}

document.getElementById("search").addEventListener("input",e=>{
  const v=e.target.value.toLowerCase();
  render(bios.filter(b=>b.toLowerCase().includes(v)));
});
</script>

</body>
</html>
