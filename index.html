<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF GFX Tool Full</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(#050b1e,#020617);
  color:white;
}
.container{
  max-width:420px;
  margin:40px auto;
  padding:20px;
  background:#0b122e;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,255,.2);
}
h1{
  text-align:center;
  color:#38bdf8;
}
select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  font-size:16px;
}
button{
  background:#22c55e;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
.result{
  margin-top:20px;
  background:#020617;
  padding:15px;
  border-radius:10px;
}
.title{
  color:#facc15;
  font-weight:bold;
  margin-top:15px;
}
ul{
  padding-left:18px;
}
li{
  margin:6px 0;
}
</style>
</head>

<body>
<div class="container">
<h1>🔥 FF GFX Tool Full</h1>

<label>RAM HP</label>
<select id="ram">
  <option value="1">1 GB</option>
  <option value="2">2 GB</option>
  <option value="3">3 GB+</option>
</select>

<label>Preset Player</label>
<select id="preset">
  <option value="kentang">Kentang / Low End</option>
  <option value="stabil">Stabil Rank</option>
  <option value="pro">Pro Player</option>
</select>

<button onclick="cekSetting()">Terapkan GFX</button>

<div class="result" id="hasil">
Pilih pengaturan lalu klik Terapkan
</div>
</div>

<script>
function cekSetting(){
  let ram=document.getElementById("ram").value;
  let preset=document.getElementById("preset").value;
  let html="";

  if(preset==="kentang"){
    html=`
    <div class="title">⚙️ GFX Kentang</div>
    <ul>
      <li>Grafik: Smooth</li>
      <li>Resolusi: Low</li>
      <li>Shadow: OFF</li>
      <li>Anti-Aliasing: OFF</li>
      <li>High FPS: ON</li>
      <li>FPS Target: 45–60</li>
    </ul>
    <div class="title">🎯 Sensitivitas</div>
    <ul>
      <li>General: 95</li>
      <li>Red Dot: 90</li>
      <li>2x Scope: 80</li>
      <li>4x Scope: 65</li>
      <li>AWM Scope: 50</li>
    </ul>
    <div class="title">🔥 Tips</div>
    <ul>
      <li>Tutup semua aplikasi</li>
      <li>Main 30–60 menit saja</li>
      <li>Jangan sambil charge</li>
    </ul>`;
  }

  if(preset==="stabil"){
    html=`
    <div class="title">⚙️ GFX Stabil Rank</div>
    <ul>
      <li>Grafik: Balanced</li>
      <li>Resolusi: Medium</li>
      <li>Shadow: OFF</li>
      <li>Anti-Aliasing: OFF</li>
      <li>High FPS: ON</li>
      <li>FPS Target: 60</li>
    </ul>
    <div class="title">🎯 Sensitivitas</div>
    <ul>
      <li>General: 90</li>
      <li>Red Dot: 85</li>
      <li>2x Scope: 75</li>
      <li>4x Scope: 65</li>
      <li>AWM Scope: 55</li>
    </ul>
    <div class="title">🔥 Tips</div>
    <ul>
      <li>Gunakan WiFi stabil</li>
      <li>HP tidak panas</li>
    </ul>`;
  }

  if(preset==="pro"){
    html=`
    <div class="title">⚙️ GFX Pro Player</div>
    <ul>
      <li>Grafik: Balanced</li>
      <li>Resolusi: High</li>
      <li>Shadow: OFF</li>
      <li>Anti-Aliasing: OFF</li>
      <li>High FPS: ON</li>
      <li>FPS Target: 60–90</li>
      <li>V-Sync: OFF</li>
    </ul>
    <div class="title">🎯 Sensitivitas Pro</div>
    <ul>
      <li>General: 90–95</li>
      <li>Red Dot: 85–90</li>
      <li>2x Scope: 75–80</li>
      <li>4x Scope: 65–70</li>
      <li>AWM Scope: 50–55</li>
    </ul>
    <div class="title">🔥 Tips Pro</div>
    <ul>
      <li>Main di ruangan dingin</li>
      <li>Pakai earphone latency rendah</li>
      <li>Restart HP sebelum war</li>
    </ul>`;
  }

  document.getElementById("hasil").innerHTML=html;
}
</script>
</body>
</html>
