<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>FF Bio Generator</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top,#0b1a3a,#020617);
  color:#fff;
  text-align:center;
}
h1{
  margin-top:30px;
  color:#ff9f1c;
  letter-spacing:2px;
}
.container{
  margin-top:30px;
}
select,button{
  padding:12px 18px;
  border-radius:10px;
  border:none;
  font-size:15px;
  font-weight:bold;
}
select{
  margin-bottom:15px;
}
.btn-gen{
  background:#ff9f1c;
  color:#000;
  margin-right:8px;
}
.btn-copy{
  background:#22c55e;
  color:#000;
}
.box{
  margin:30px auto;
  max-width:320px;
  padding:20px;
  border:2px dashed #ff9f1c;
  border-radius:14px;
}
.rainbow{
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff004c,#ff9100,#ffee00,#00ff99,#00ccff,#a855f7);
  background-size:300% 300%;
  animation:rainbow 4s linear infinite;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
@keyframes rainbow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
</style>
</head>

<body>

<h1>🔥 FF BIO GENERATOR 🔥</h1>

<div class="container">
  <select id="kategori">
    <option value="toxic">☠️ Toxic</option>
    <option value="santuy">😎 Santuy</option>
    <option value="pro">🔥 Pro</option>
  </select><br>

  <button class="btn-gen" onclick="generateBio()">🎯 GENERATE BIO</button>
  <button class="btn-copy" onclick="copyBio()">📋 COPY</button>

  <div class="box">
    <div id="bio" class="rainbow">Klik Generate Bio</div>
  </div>
</div>

<script>
const data = {
toxic:[
"☠️ MENDING AFK",
"🔥 KALAH SEKALI BALAS 10X",
"💀 BARBAR SAMPAI BOOYAH",
"☠️ FF MODE SADIS",
"🔥 NO MERCY"
],
santuy:[
"😎 MAIN SANTUY AUTO BOOYAH",
"🌴 MAIN TENANG MENANG DATANG",
"😎 LOGIN BENTAR RANK NAIK",
"🌤️ SANTUY TAPI BERBAHAYA",
"😎 FF JALAN TERUS"
],
pro:[
"🔥 AIM KEPALA BUKAN BADAN",
"🎯 AKURASI DI ATAS SEGALANYA",
"👑 ZONA AKHIR MILIKKU",
"🔥 SKILL > SETTING",
"🎯 ONE TAP ONE DOWN"
]
};

function generateBio(){
  const kat=document.getElementById("kategori").value;
  const list=data[kat];
  const random=list[Math.floor(Math.random()*list.length)];
  document.getElementById("bio").innerText=random;
}

function copyBio(){
  const text=document.getElementById("bio").innerText;
  if(text==="Klik Generate Bio") return;
  navigator.clipboard.writeText(text);
  alert("Bio berhasil dicopy!");
}
</script>

</body>
</html>
