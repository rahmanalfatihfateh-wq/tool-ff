
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bio FF Warna-Warni</title>
<style>
body{
  background:#0f172a;
  font-family:Arial, sans-serif;
  color:white;
}
.container{
  max-width:600px;
  margin:auto;
  padding:15px;
}
.bio{
  background:#020617;
  border:1px solid #334155;
  border-radius:8px;
  padding:10px;
  margin-bottom:10px;
}
.text{
  font-size:16px;
  margin-bottom:8px;
}
button{
  background:#22c55e;
  border:none;
  color:black;
  padding:6px 12px;
  border-radius:5px;
  cursor:pointer;
}
button:active{
  transform:scale(0.95);
}
</style>
</head>

<body>
<div class="container">

  <div class="bio">
    <div class="text">🔥 ꧁༺ʙᴏᴏʏᴀʜ༻꧂ 🔥</div>
    <button onclick="copyText(this)">Copy</button>
  </div>

  <div class="bio">
    <div class="text">⚡ FF KENTANG TAPI PRO ⚡</div>
    <button onclick="copyText(this)">Copy</button>
  </div>

  <div class="bio">
    <div class="text">👑 SOLO VS SQUAD 👑</div>
    <button onclick="copyText(this)">Copy</button>
  </div>

  <!-- tinggal tambah sampai 100 bio -->
</div>

<script>
function copyText(btn){
  let text = btn.previousElementSibling.innerText;
  navigator.clipboard.writeText(text);
  btn.innerText = "Copied!";
  setTimeout(()=> btn.innerText="Copy",1500);
}
</script>

</body>
</html>
