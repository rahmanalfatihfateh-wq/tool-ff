<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bio FF Keren 2026 | Bio Free Fire Pro, Toxic, Santai</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  background:#0d0d0d;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
  padding:20px;
}
h1 { color:#ff6a00; }
.box {
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  margin:20px auto;
  max-width:350px;
  font-size:16px;
}
button {
  width:45%;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  background:#ff6a00;
  color:white;
}
.menu button {
  width:90%;
}
.footer {
  font-size:12px;
  opacity:0.6;
  margin-top:20px;
}
</style>
</head>

<body>

<h1>🔥 Bio FF Generator</h1>
<p>Copy bio Free Fire keren — 1 klik</p>

<div class="menu">
  <button onclick="setKategori('pro')">🔥 Bio Pro</button>
  <button onclick="setKategori('toxic')">☠️ Bio Toxic</button>
  <button onclick="setKategori('santai')">😎 Bio Santai</button>
</div>

<div class="box" id="bio">
Klik kategori untuk mulai
</div>

<button onclick="copyBio()">COPY</button>
<button onclick="randomBio()">GANTI</button>

<div class="footer">
© Bio FF Generator
</div>

<script>
let kategori = "pro";

const data = {
  pro: [
    "亗𝙿𝚁𝙾 𝙿𝙻𝙰𝚈𝙴𝚁亗\nBooyah Or Die",
    "FF PRO MODE\nNo Mercy",
    "𝙻𝙾𝙽𝙴 𝙵𝙵\nSilent Kill"
  ],
  toxic: [
    "NO TALK\nJUST BOOYAH",
    "BOT JANGAN NANGIS",
    "SKILL ISSUE?"
  ],
  santai: [
    "Main Santai\nBooyah Datang",
    "No Rank No Stress",
    "Push Rank Kalau Mood"
  ]
};

function setKategori(k) {
  kategori = k;
  randomBio();
}

function randomBio() {
  const list = data[kategori];
  const i = Math.floor(Math.random() * list.length);
  document.getElementById("bio").innerText = list[i];
}

function copyBio() {
  const text = document.getElementById("bio").innerText;
  navigator.clipboard.writeText(text);
  alert("Bio berhasil di copy!");
}
</script>

</body>
</html>
